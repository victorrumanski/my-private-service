# Values for the Orchestrator
common-microservice:
  replicaCount: 1
  image:
    repository: ghcr.io/victorrumanski/my-private-service
    tag: "latest"
  service:
    port: 80
    targetPort: 8080
  env:
    dbHost: "postgres-postgresql.data.svc.cluster.local"
    dbName: "appdb"
    dbUser: "app"
    kafkaHost: "kafka.data.svc.cluster.local"
  probes:
    enabled: false
  ingress:
    enabled: false
